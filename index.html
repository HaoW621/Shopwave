<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopWave</title>
<!-- Adobe Spectrum CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/spectrum-css/3.0.0-alpha.1/vars.css">
<style>
  /* === Adobe Spectrum Design Tokens === */
  :root {
    --spectrum-global-color-blue-400: #2680eb;
    --spectrum-global-color-blue-500: #1473e6;
    --spectrum-global-color-blue-600: #0d66d0;
    --spectrum-global-color-gray-50:  #ffffff;
    --spectrum-global-color-gray-75:  #fafafa;
    --spectrum-global-color-gray-100: #f5f5f5;
    --spectrum-global-color-gray-200: #eaeaea;
    --spectrum-global-color-gray-300: #d3d3d3;
    --spectrum-global-color-gray-400: #bcbcbc;
    --spectrum-global-color-gray-700: #4b4b4b;
    --spectrum-global-color-gray-800: #2c2c2c;
    --spectrum-global-color-gray-900: #1a1a1a;
    --spectrum-global-color-red-500:  #e34850;
    --spectrum-global-color-green-500:#2d9d78;
    --spectrum-global-color-orange-500:#e68619;
    --spectrum-alias-body-text-color: var(--spectrum-global-color-gray-800);
    --spectrum-alias-border-color:    var(--spectrum-global-color-gray-300);
    --spectrum-alias-background-color-default: var(--spectrum-global-color-gray-75);
    --spectrum-alias-focus-color:     var(--spectrum-global-color-blue-500);
    --spectrum-global-font-families-sans: 'Adobe Clean', 'Source Sans Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --spectrum-global-dimension-size-50:  4px;
    --spectrum-global-dimension-size-100: 8px;
    --spectrum-global-dimension-size-150: 12px;
    --spectrum-global-dimension-size-200: 16px;
    --spectrum-global-dimension-size-300: 24px;
    --spectrum-global-dimension-size-400: 32px;
    --spectrum-global-dimension-size-500: 40px;
    --spectrum-global-dimension-size-600: 48px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--spectrum-global-font-families-sans);
    background: var(--spectrum-alias-background-color-default);
    color: var(--spectrum-alias-body-text-color);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ===== SHELL / TOP NAV ===== */
  .spectrum-Shell {
    background: var(--spectrum-global-color-gray-900);
    color: #fff;
    display: flex;
    align-items: center;
    height: 48px;
    padding: 0 var(--spectrum-global-dimension-size-300);
    gap: var(--spectrum-global-dimension-size-300);
    position: sticky; top: 0; z-index: 100;
  }
  .spectrum-Shell-appName {
    font-size: 18px; font-weight: 700; letter-spacing: -.5px; color: #fff; cursor: pointer;
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .spectrum-Shell-appName .brand-icon {
    width: 26px; height: 26px; background: var(--spectrum-global-color-blue-400);
    border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .spectrum-Shell-search {
    flex: 1; max-width: 440px;
    display: flex; align-items: center;
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
    border-radius: 4px; overflow: hidden;
    transition: background .15s, border-color .15s;
  }
  .spectrum-Shell-search:focus-within {
    background: rgba(255,255,255,.18); border-color: var(--spectrum-global-color-blue-400);
  }
  .spectrum-Shell-search input {
    flex: 1; background: transparent; border: none; color: #fff;
    padding: 6px 12px; font-size: 13px; outline: none;
  }
  .spectrum-Shell-search input::placeholder { color: rgba(255,255,255,.5); }
  .spectrum-Shell-search-icon { padding: 0 10px; opacity: .6; font-size: 13px; }
  .spectrum-Shell-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  /* Spectrum Button */
  .spectrum-Button {
    display: inline-flex; align-items: center; gap: 6px;
    border: none; border-radius: 4px; padding: 0 14px; height: 32px;
    font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer;
    transition: background .12s, box-shadow .12s;
    white-space: nowrap;
  }
  .spectrum-Button--cta {
    background: var(--spectrum-global-color-blue-500); color: #fff;
  }
  .spectrum-Button--cta:hover { background: var(--spectrum-global-color-blue-600); }
  .spectrum-Button--secondary {
    background: transparent; color: rgba(255,255,255,.85);
    border: 1px solid rgba(255,255,255,.3);
  }
  .spectrum-Button--secondary:hover { background: rgba(255,255,255,.1); }
  .spectrum-Button--outline {
    background: transparent; color: var(--spectrum-global-color-blue-500);
    border: 1px solid var(--spectrum-global-color-blue-500);
  }
  .spectrum-Button--outline:hover { background: rgba(38,128,235,.08); }
  .spectrum-Button--quiet {
    background: transparent; color: var(--spectrum-alias-body-text-color);
    border: 1px solid var(--spectrum-alias-border-color);
  }
  .spectrum-Button--quiet:hover { background: var(--spectrum-global-color-gray-100); }

  .cart-badge {
    background: var(--spectrum-global-color-red-500); color: #fff;
    border-radius: 10px; min-width: 18px; height: 18px;
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; padding: 0 4px;
  }

  /* ===== BREADCRUMB / SUBHEADER ===== */
  .spectrum-Subheader {
    background: var(--spectrum-global-color-gray-50);
    border-bottom: 1px solid var(--spectrum-alias-border-color);
    padding: 0 var(--spectrum-global-dimension-size-300);
    display: flex; align-items: center; gap: var(--spectrum-global-dimension-size-100); height: 40px;
    font-size: 12px; color: var(--spectrum-global-color-gray-700);
  }
  .spectrum-Subheader a { color: var(--spectrum-global-color-blue-500); text-decoration: none; }
  .spectrum-Subheader a:hover { text-decoration: underline; }
  .breadcrumb-sep { color: var(--spectrum-global-color-gray-400); }

  /* ===== HERO ===== */
  .spectrum-Hero {
    background: linear-gradient(120deg, #0f3557 0%, #1473e6 100%);
    color: #fff; padding: 56px var(--spectrum-global-dimension-size-300) 52px;
    text-align: center;
  }
  .spectrum-Hero-eyebrow { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; opacity: .7; margin-bottom: 10px; }
  .spectrum-Hero-heading { font-size: 2.4rem; font-weight: 700; line-height: 1.2; margin-bottom: 12px; letter-spacing: -.5px; }
  .spectrum-Hero-body { font-size: 16px; opacity: .82; margin-bottom: 28px; max-width: 480px; margin-left: auto; margin-right: auto; }
  .spectrum-Hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .spectrum-Hero-actions .spectrum-Button { height: 40px; padding: 0 24px; font-size: 14px; border-radius: 4px; }

  /* ===== RAIL + CONTENT LAYOUT ===== */
  .spectrum-Layout { display: flex; max-width: 1280px; margin: 0 auto; padding: var(--spectrum-global-dimension-size-300); gap: var(--spectrum-global-dimension-size-300); align-items: flex-start; }

  /* Left Rail */
  .spectrum-Rail {
    width: 200px; flex-shrink: 0;
    background: var(--spectrum-global-color-gray-50);
    border: 1px solid var(--spectrum-alias-border-color);
    border-radius: 4px; overflow: hidden;
  }
  .spectrum-Rail-title {
    padding: 12px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--spectrum-global-color-gray-700);
    border-bottom: 1px solid var(--spectrum-alias-border-color);
    background: var(--spectrum-global-color-gray-100);
  }
  .spectrum-SideNav { list-style: none; }
  .spectrum-SideNav-item { border-bottom: 1px solid var(--spectrum-global-color-gray-200); }
  .spectrum-SideNav-item:last-child { border-bottom: none; }
  .spectrum-SideNav-link {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; font-size: 13px; color: var(--spectrum-alias-body-text-color);
    cursor: pointer; transition: background .1s;
    border: none; background: transparent; width: 100%; text-align: left; font-family: inherit;
  }
  .spectrum-SideNav-link:hover { background: var(--spectrum-global-color-gray-100); }
  .spectrum-SideNav-link.is-selected {
    color: var(--spectrum-global-color-blue-500); font-weight: 600;
    background: rgba(38,128,235,.07);
    border-left: 3px solid var(--spectrum-global-color-blue-500);
    padding-left: 13px;
  }
  .spectrum-SideNav-count {
    background: var(--spectrum-global-color-gray-200); color: var(--spectrum-global-color-gray-700);
    border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 600;
  }

  /* Main content */
  .spectrum-Content { flex: 1; min-width: 0; }

  /* Toolbar */
  .spectrum-Toolbar {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
    gap: 10px; margin-bottom: var(--spectrum-global-dimension-size-200);
  }
  .spectrum-Toolbar-title { font-size: 18px; font-weight: 700; }
  .spectrum-Toolbar-right { display: flex; align-items: center; gap: 8px; }

  /* Tag / Pill */
  .spectrum-Tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--spectrum-global-color-gray-200); color: var(--spectrum-global-color-gray-800);
    border-radius: 3px; padding: 2px 8px; font-size: 11px; font-weight: 600;
  }
  .spectrum-Tag--blue { background: rgba(38,128,235,.12); color: var(--spectrum-global-color-blue-600); }
  .spectrum-Tag--green { background: rgba(45,157,120,.12); color: var(--spectrum-global-color-green-500); }
  .spectrum-Tag--orange { background: rgba(230,134,25,.12); color: var(--spectrum-global-color-orange-500); }
  .spectrum-Tag--red { background: rgba(227,72,80,.12); color: var(--spectrum-global-color-red-500); }

  /* ===== PRODUCT CARD ===== */
  .spectrum-Grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .spectrum-Card {
    background: var(--spectrum-global-color-gray-50);
    border: 1px solid var(--spectrum-alias-border-color);
    border-radius: 4px; overflow: hidden;
    transition: border-color .15s, box-shadow .15s; cursor: pointer;
    display: flex; flex-direction: column;
  }
  .spectrum-Card:hover {
    border-color: var(--spectrum-global-color-blue-400);
    box-shadow: 0 2px 16px rgba(38,128,235,.13);
  }
  .spectrum-Card-preview {
    height: 160px; display: flex; align-items: center; justify-content: center;
    font-size: 4rem; background: var(--spectrum-global-color-gray-100);
    border-bottom: 1px solid var(--spectrum-alias-border-color); position: relative;
  }
  .spectrum-Card-badge {
    position: absolute; top: 10px; right: 10px;
  }
  .spectrum-Card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; }
  .spectrum-Card-subtitle { font-size: 11px; color: var(--spectrum-global-color-gray-700); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .spectrum-Card-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
  .spectrum-Card-desc { font-size: 12px; color: var(--spectrum-global-color-gray-700); flex: 1; line-height: 1.5; margin-bottom: 14px; }
  .spectrum-Card-footer { display: flex; align-items: center; justify-content: space-between; }
  .spectrum-Card-price { font-size: 16px; font-weight: 700; color: var(--spectrum-global-color-gray-900); }
  .spectrum-Card-price small { font-size: 11px; font-weight: 400; color: var(--spectrum-global-color-gray-700); }

  /* ===== CART DRAWER ===== */
  .spectrum-Overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    z-index: 200; display: none; backdrop-filter: blur(2px);
  }
  .spectrum-Overlay.is-open { display: block; }
  .spectrum-Drawer {
    position: fixed; right: 0; top: 0; bottom: 0; width: 400px; max-width: 100vw;
    background: var(--spectrum-global-color-gray-50);
    border-left: 1px solid var(--spectrum-alias-border-color);
    z-index: 201; display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform .22s cubic-bezier(.4,0,.2,1);
  }
  .spectrum-Drawer.is-open { transform: translateX(0); }
  .spectrum-Drawer-header {
    padding: 16px 20px; border-bottom: 1px solid var(--spectrum-alias-border-color);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--spectrum-global-color-gray-100);
  }
  .spectrum-Drawer-header h2 { font-size: 16px; font-weight: 700; }
  .spectrum-ActionButton {
    background: transparent; border: 1px solid transparent; border-radius: 4px;
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; color: var(--spectrum-global-color-gray-700);
    transition: background .1s, border-color .1s;
  }
  .spectrum-ActionButton:hover { background: var(--spectrum-global-color-gray-200); border-color: var(--spectrum-alias-border-color); }
  .spectrum-Drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .spectrum-Cart-empty { text-align: center; color: var(--spectrum-global-color-gray-700); padding: 60px 0; }
  .spectrum-Cart-empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .spectrum-CartItem {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 14px 0; border-bottom: 1px solid var(--spectrum-alias-border-color);
  }
  .spectrum-CartItem-icon {
    width: 52px; height: 52px; border-radius: 4px; flex-shrink: 0;
    background: var(--spectrum-global-color-gray-100);
    border: 1px solid var(--spectrum-alias-border-color);
    display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
  }
  .spectrum-CartItem-info { flex: 1; min-width: 0; }
  .spectrum-CartItem-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .spectrum-CartItem-price { font-size: 12px; color: var(--spectrum-global-color-gray-700); }
  .spectrum-Stepper { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
  .spectrum-Stepper-btn {
    width: 24px; height: 24px; border-radius: 3px; border: 1px solid var(--spectrum-alias-border-color);
    background: var(--spectrum-global-color-gray-50); font-size: 14px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--spectrum-global-color-gray-800); line-height: 1;
    transition: background .1s;
  }
  .spectrum-Stepper-btn:hover { background: var(--spectrum-global-color-gray-100); border-color: var(--spectrum-global-color-gray-400); }
  .spectrum-Stepper-value { font-size: 13px; font-weight: 700; min-width: 20px; text-align: center; }
  .spectrum-Drawer-footer {
    padding: 16px 20px; border-top: 1px solid var(--spectrum-alias-border-color);
    background: var(--spectrum-global-color-gray-100);
  }
  .spectrum-Drawer-total {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px; font-size: 15px; font-weight: 700;
  }
  .spectrum-Divider { border: none; border-top: 1px solid var(--spectrum-alias-border-color); margin: 12px 0; }
  .spectrum-Button--full { width: 100%; justify-content: center; height: 40px; font-size: 14px; border-radius: 4px; }

  /* ===== TOAST ===== */
  .spectrum-Toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--spectrum-global-color-gray-900); color: #fff;
    border-radius: 4px; padding: 10px 20px;
    font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none;
    transition: all .25s; z-index: 400; display: flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,.3); white-space: nowrap;
  }
  .spectrum-Toast.is-open { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Empty state */
  .spectrum-EmptyState { text-align: center; padding: 48px 20px; color: var(--spectrum-global-color-gray-700); }
  .spectrum-EmptyState-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .spectrum-EmptyState-heading { font-size: 16px; font-weight: 700; margin-bottom: 6px; }

  @media (max-width: 768px) {
    .spectrum-Rail { display: none; }
    .spectrum-Layout { padding: 16px; }
    .spectrum-Hero-heading { font-size: 1.7rem; }
  }
</style>
</head>
<body>

<!-- Top Navigation Shell -->
<header class="spectrum-Shell">
  <div class="spectrum-Shell-appName" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <div class="brand-icon">🛍</div>
    ShopWave
  </div>
  <div class="spectrum-Shell-search">
    <span class="spectrum-Shell-search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="商品を検索..." oninput="filterProducts()">
  </div>
  <div class="spectrum-Shell-actions">
    <button class="spectrum-Button spectrum-Button--secondary" onclick="toggleCart()">
      🛒 カート <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>
</header>

<!-- Breadcrumb -->
<nav class="spectrum-Subheader">
  <a href="#">ホーム</a><span class="breadcrumb-sep">/</span>
  <span id="breadcrumbCat">すべての商品</span>
</nav>

<!-- Hero -->
<section class="spectrum-Hero">
  <div class="spectrum-Hero-eyebrow">Spring Collection 2025</div>
  <h1 class="spectrum-Hero-heading">トレンドを、あなたの手に。</h1>
  <p class="spectrum-Hero-body">最新アイテムが毎日入荷中。送料無料・翌日配送対応。</p>
  <div class="spectrum-Hero-actions">
    <button class="spectrum-Button spectrum-Button--cta" onclick="document.getElementById('main').scrollIntoView({behavior:'smooth'})">今すぐショッピング</button>
    <button class="spectrum-Button spectrum-Button--secondary">キャンペーンを見る</button>
  </div>
</section>

<!-- Main Layout -->
<div class="spectrum-Layout" id="main">

  <!-- Left Rail -->
  <aside class="spectrum-Rail">
    <div class="spectrum-Rail-title">カテゴリー</div>
    <ul class="spectrum-SideNav" id="sideNav"></ul>
  </aside>

  <!-- Content -->
  <main class="spectrum-Content">
    <div class="spectrum-Toolbar">
      <div class="spectrum-Toolbar-title" id="sectionTitle">すべての商品</div>
      <div class="spectrum-Toolbar-right">
        <span class="spectrum-Tag" id="resultCount">12件</span>
      </div>
    </div>
    <div class="spectrum-Grid" id="productGrid"></div>
  </main>

</div>

<!-- Cart Drawer -->
<div class="spectrum-Overlay" id="overlay" onclick="toggleCart()"></div>
<div class="spectrum-Drawer" id="drawer">
  <div class="spectrum-Drawer-header">
    <h2>🛒 カート</h2>
    <button class="spectrum-ActionButton" onclick="toggleCart()" title="閉じる">✕</button>
  </div>
  <div class="spectrum-Drawer-body" id="cartBody"></div>
  <div class="spectrum-Drawer-footer" id="cartFooter" style="display:none">
    <div class="spectrum-Drawer-total">
      <span>合計金額</span>
      <span id="totalPrice">¥0</span>
    </div>
    <hr class="spectrum-Divider">
    <button class="spectrum-Button spectrum-Button--cta spectrum-Button--full" onclick="checkout()">レジへ進む →</button>
  </div>
</div>

<!-- Toast -->
<div class="spectrum-Toast" id="toast"></div>

<script>
const PRODUCTS = [
  { id:1,  name:'ワイヤレスイヤホン Pro', cat:'電子機器', price:12800, emoji:'🎧', desc:'ノイズキャンセリング搭載。最大30時間再生。', isNew:true },
  { id:2,  name:'スマートウォッチ X5',    cat:'電子機器', price:24800, emoji:'⌚', desc:'健康管理・GPS対応。防水仕様。', isNew:false },
  { id:3,  name:'メカニカルキーボード',   cat:'電子機器', price:8900,  emoji:'⌨️', desc:'RGB対応。打鍵感抜群の青軸モデル。', isNew:false },
  { id:4,  name:'プレミアムスニーカー',   cat:'ファッション', price:15000, emoji:'👟', desc:'軽量ソール採用。カジュアル〜スポーツまで。', isNew:true },
  { id:5,  name:'ミニマルレザー財布',     cat:'ファッション', price:5800,  emoji:'👛', desc:'イタリア製本革。カードスロット×8。', isNew:false },
  { id:6,  name:'デザインTシャツ',        cat:'ファッション', price:3200,  emoji:'👕', desc:'オーガニックコットン100%。全12色展開。', isNew:false },
  { id:7,  name:'アロマディフューザー',   cat:'インテリア', price:4500,  emoji:'🕯️', desc:'超音波式。7色LEDライト内蔵。', isNew:true },
  { id:8,  name:'北欧風クッション',       cat:'インテリア', price:2800,  emoji:'🛋️', desc:'やわらかマイクロファイバー素材。', isNew:false },
  { id:9,  name:'観葉植物セット',         cat:'インテリア', price:6200,  emoji:'🪴', desc:'初心者向け3点セット。鉢付き。', isNew:false },
  { id:10, name:'コールドブリューボトル', cat:'キッチン', price:3600,  emoji:'🫙', desc:'ガラス製1L。冷蔵庫にすっきり収納。', isNew:true },
  { id:11, name:'セラミックマグカップ',   cat:'キッチン', price:1800,  emoji:'☕', desc:'電子レンジ・食洗機対応。300ml。', isNew:false },
  { id:12, name:'電動ハンドミキサー',     cat:'キッチン', price:5400,  emoji:'🍳', desc:'5段階速度調節。パワフル200W。', isNew:false },
];

const CATS = ['すべて', ...new Set(PRODUCTS.map(p => p.cat))];
const CAT_LABEL = { 'すべて':'すべての商品', '電子機器':'電子機器', 'ファッション':'ファッション', 'インテリア':'インテリア', 'キッチン':'キッチン' };
let currentCat = 'すべて', searchQ = '', cart = {};

// Side Nav
const nav = document.getElementById('sideNav');
CATS.forEach(c => {
  const cnt = c === 'すべて' ? PRODUCTS.length : PRODUCTS.filter(p => p.cat === c).length;
  const li = document.createElement('li'); li.className = 'spectrum-SideNav-item';
  const btn = document.createElement('button');
  btn.className = 'spectrum-SideNav-link' + (c === currentCat ? ' is-selected' : '');
  btn.innerHTML = `<span>${CAT_LABEL[c]}</span><span class="spectrum-SideNav-count">${cnt}</span>`;
  btn.onclick = () => { currentCat = c; renderNav(); renderProducts(); updateBreadcrumb(); };
  li.appendChild(btn); nav.appendChild(li);
});

function renderNav() {
  nav.querySelectorAll('.spectrum-SideNav-link').forEach((b, i) => b.classList.toggle('is-selected', CATS[i] === currentCat));
}
function updateBreadcrumb() {
  document.getElementById('breadcrumbCat').textContent = CAT_LABEL[currentCat] || currentCat;
}
function filterProducts() {
  searchQ = document.getElementById('searchInput').value.trim().toLowerCase();
  renderProducts();
}
function renderProducts() {
  const grid = document.getElementById('productGrid');
  const title = document.getElementById('sectionTitle');
  const cnt = document.getElementById('resultCount');
  let filtered = PRODUCTS.filter(p =>
    (currentCat === 'すべて' || p.cat === currentCat) &&
    (!searchQ || p.name.toLowerCase().includes(searchQ) || p.cat.includes(searchQ) || p.desc.includes(searchQ))
  );
  title.textContent = CAT_LABEL[currentCat] || currentCat;
  cnt.textContent = `${filtered.length}件`;
  grid.innerHTML = '';
  if (!filtered.length) {
    grid.innerHTML = `<div class="spectrum-EmptyState" style="grid-column:1/-1">
      <div class="spectrum-EmptyState-icon">🔍</div>
      <div class="spectrum-EmptyState-heading">該当する商品が見つかりません</div>
      <p style="font-size:13px">検索ワードやカテゴリーを変更してみてください。</p>
    </div>`; return;
  }
  filtered.forEach(p => {
    const el = document.createElement('div'); el.className = 'spectrum-Card';
    el.innerHTML = `
      <div class="spectrum-Card-preview">
        ${p.emoji}
        ${p.isNew ? '<span class="spectrum-Tag spectrum-Tag--blue spectrum-Card-badge">NEW</span>' : ''}
      </div>
      <div class="spectrum-Card-body">
        <div class="spectrum-Card-subtitle">${p.cat}</div>
        <div class="spectrum-Card-title">${p.name}</div>
        <div class="spectrum-Card-desc">${p.desc}</div>
        <div class="spectrum-Card-footer">
          <div class="spectrum-Card-price">¥${p.price.toLocaleString()} <small>税込</small></div>
          <button class="spectrum-Button spectrum-Button--cta" style="height:28px;padding:0 12px;font-size:12px" onclick="addToCart(${p.id})">+ 追加</button>
        </div>
      </div>`;
    grid.appendChild(el);
  });
}

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCartBadge();
  const p = PRODUCTS.find(x => x.id === id);
  showToast(`✅ ${p.name} をカートに追加しました`);
}
function removeFromCart(id) { delete cart[id]; updateCartBadge(); renderCart(); }
function changeQty(id, d) {
  cart[id] = (cart[id] || 0) + d;
  if (cart[id] <= 0) delete cart[id];
  updateCartBadge(); renderCart();
}
function updateCartBadge() {
  document.getElementById('cartBadge').textContent = Object.values(cart).reduce((a,b)=>a+b,0);
}
function renderCart() {
  const body = document.getElementById('cartBody'), footer = document.getElementById('cartFooter');
  const keys = Object.keys(cart);
  if (!keys.length) {
    body.innerHTML = `<div class="spectrum-Cart-empty"><div class="spectrum-Cart-empty-icon">🛒</div><p>カートに商品がありません</p></div>`;
    footer.style.display = 'none'; return;
  }
  footer.style.display = '';
  let total = 0;
  body.innerHTML = keys.map(id => {
    const p = PRODUCTS.find(x => x.id == id), sub = p.price * cart[id]; total += sub;
    return `<div class="spectrum-CartItem">
      <div class="spectrum-CartItem-icon">${p.emoji}</div>
      <div class="spectrum-CartItem-info">
        <div class="spectrum-CartItem-name">${p.name}</div>
        <div class="spectrum-CartItem-price">¥${p.price.toLocaleString()} × ${cart[id]} = ¥${sub.toLocaleString()}</div>
        <div class="spectrum-Stepper">
          <button class="spectrum-Stepper-btn" onclick="changeQty(${id},-1)">−</button>
          <span class="spectrum-Stepper-value">${cart[id]}</span>
          <button class="spectrum-Stepper-btn" onclick="changeQty(${id},1)">+</button>
          <button class="spectrum-ActionButton" onclick="removeFromCart(${id})" style="margin-left:6px;font-size:12px" title="削除">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('totalPrice').textContent = '¥' + total.toLocaleString();
}
function toggleCart() {
  const open = document.getElementById('drawer').classList.toggle('is-open');
  document.getElementById('overlay').classList.toggle('is-open', open);
  if (open) renderCart();
}
function checkout() {
  cart = {}; updateCartBadge(); toggleCart();
  showToast('✅ ご注文ありがとうございます！');
}
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg;
  t.classList.add('is-open');
  setTimeout(() => t.classList.remove('is-open'), 2800);
}

renderProducts();
</script>
</body>
</html>
